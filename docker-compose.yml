# docker-compose.yml — raiz do projeto
services:
  db:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: coursesphere
      POSTGRES_PASSWORD: coursesphere
      POSTGRES_DB: coursesphere_development
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coursesphere"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      target: dev
    command: >
      bash -c "rm -f tmp/pids/server.pid &&
               bundle exec rails db:prepare &&
               bundle exec rails s -b 0.0.0.0"
    volumes:
      - ./backend:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://coursesphere:coursesphere@db/coursesphere_development
      RAILS_ENV: development
      JWT_SECRET_KEY: dev_jwt_secret_troque_em_producao

volumes:
  pg_data:
  bundle_cache: